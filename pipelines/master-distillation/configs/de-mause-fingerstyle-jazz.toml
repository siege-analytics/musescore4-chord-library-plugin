# OCR was correct; master_id was wrong. Re-keyed under alan-de-mause.

[master]
id = "alan-de-mause"
name = "Alan de Mause"

[work]
id = "complete-fingerstyle-jazz-guitar-book"
title = "Mel Bay's Complete Fingerstyle Jazz Guitar Book"
year = 2001
instrument_scope = "6-string fingerstyle"

[source]
pdf = "~/jazz_docs/Guitar/Methods/Jazz/Carter - Fingerstyle Jazz.pdf"
host = "cyberpower"
user = "dheerajchand"
needs_ocr = false

[ocr]
host = "cyberpower"
user = "dheerajchand"
vision_model = "qwen2.5vl:7b"
confidence_threshold = 0.70
min_chars_per_page = 40
render_dpi = 200

[stages.s1]
ocr_lang = "en"

[stages.s2]
chapter_strategy = "toc-or-heading"
