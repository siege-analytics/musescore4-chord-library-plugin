# Per-book config for the master-distillation pipeline.
# Sixth book through the pipeline. SECOND scanned PDF (after Mickey Baker)
# routed through the cyberpower OCR branch (#315/#316).
#
# Van Eps's *Harmonic Mechanisms for Guitar, Volume 1* (Mel Bay, 2016
# reissue; original publication mid-1980s) is THE canonical Van Eps
# primary source — adds as a sibling work[] under the existing `van-eps`
# master alongside the 1939 method (already promoted via PR #305).
#
# 334 pages, 14 chars/page from pdftotext → fully scanned. Expected
# tesseract baseline ~30-50 min; total wall time 1-2 hours.

[master]
id = "van-eps"
name = "George Van Eps"

[work]
id = "harmonic-mechanisms-vol-1"
title = "Harmonic Mechanisms for Guitar, Volume 1"
year = 2016
instrument_scope = "7-string"

[source]
pdf = "~/Desktop/parse_these/George Van Eps Harmonic Mechanisms for Guitar, Volume 1 -- George Van Eps [Van Eps, George] -- 2016 -- Mel Bay Publications, Inc_ -- d73148f4fc6a6f38407f26a61541d763 -- Anna’s Archive.pdf"
needs_ocr = true

[ocr]
host = "cyberpower"
user = "dheerajchand"
vision_model = "qwen2.5vl:7b"
confidence_threshold = 0.70
min_chars_per_page = 40
render_dpi = 200

[stages.s1]
ocr_lang = "en"

[stages.s2]
chapter_strategy = "toc-or-heading"
min_chapter_chars = 500
model = "claude-sonnet"

[stages.s3]
per_chapter_model = "claude-haiku"
book_level_model = "claude-sonnet"

[stages.s4]
model = "claude-sonnet"
engine_kind_policy = "pending-when-unsure"
